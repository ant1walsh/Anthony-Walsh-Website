<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anthony Walsh — Technical Product Marketing</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet" />
<script src="https://assets.calendly.com/assets/external/widget.js" async></script>
<style>
/* ============ TOKENS ============ */
:root {
  --font-display:"Space Grotesk", system-ui, sans-serif;
  --font-mono:"JetBrains Mono", ui-monospace, monospace;
  --font-body:"Inter", system-ui, sans-serif;
  --cobalt:227 100% 62%;      /* electric cobalt */
  --cobalt-deep:226 85% 52%;
  --radius:6px;
  --maxw:1180px;
  --ease:cubic-bezier(.22,1,.36,1);
}
html[data-theme="dark"] {
  --bg:0 0% 4%;
  --bg-2:0 0% 6.5%;
  --surface:0 0% 8%;
  --surface-2:0 0% 11%;
  --text:0 0% 98%;
  --muted:0 0% 58%;
  --border:0 0% 16%;
  --border-2:0 0% 22%;
  --card-shadow:0 24px 60px -30px rgba(0,0,0,.9);
  --grid-line:0 0% 100%;
}
html[data-theme="light"] {
  --bg:0 0% 100%;
  --bg-2:0 0% 96.5%;
  --surface:0 0% 100%;
  --surface-2:0 0% 96%;
  --text:0 0% 7%;
  --muted:0 0% 38%;
  --border:0 0% 88%;
  --border-2:0 0% 80%;
  --card-shadow:0 20px 50px -30px rgba(20,30,60,.28);
  --grid-line:0 0% 0%;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family:var(--font-body); background:hsl(var(--bg)); color:hsl(var(--text));
  line-height:1.6; -webkit-font-smoothing:antialiased; overflow-x:hidden;
  transition:background .35s var(--ease), color .35s var(--ease);
}
h1,h2,h3,h4 { font-family:var(--font-display); font-weight:600; line-height:1.08; letter-spacing:-.02em; }
a { color:inherit; text-decoration:none; }
img { max-width:100%; display:block; }
::selection { background:hsl(var(--cobalt)/.35); color:#fff; }
.wrap { max-width:var(--maxw); margin:0 auto; padding:0 24px; }
.accent { color:hsl(var(--cobalt)); }
.mono { font-family:var(--font-mono); }
/* section label // */
.label { font-family:var(--font-mono); font-size:.72rem; font-weight:500; letter-spacing:.02em; color:hsl(var(--cobalt)); text-transform:lowercase; display:inline-flex; align-items:center; gap:.4rem; }
.label::before { content:"//"; opacity:.6; }
.btn {
  display:inline-flex; align-items:center; gap:.5rem; font-family:var(--font-mono); font-weight:500; font-size:.82rem;
  padding:.7rem 1.15rem; border-radius:var(--radius); cursor:pointer; border:1px solid transparent; white-space:nowrap;
  transition:transform .22s var(--ease), background .22s, border-color .22s, box-shadow .22s;
}
.btn-primary { background:hsl(var(--cobalt)); color:#fff; box-shadow:0 8px 26px -12px hsl(var(--cobalt)/.8); }
.btn-primary:hover { transform:translateY(-2px); background:hsl(var(--cobalt-deep)); box-shadow:0 14px 34px -12px hsl(var(--cobalt)/.9); }
.btn-ghost { background:transparent; color:hsl(var(--text)); border-color:hsl(var(--border-2)); }
.btn-ghost:hover { transform:translateY(-2px); border-color:hsl(var(--cobalt)); color:hsl(var(--cobalt)); }

/* ============ NAV ============ */
header.nav { position:fixed; top:0; left:0; right:0; z-index:100; backdrop-filter:blur(14px);
  background:hsl(var(--bg)/.78); border-bottom:1px solid hsl(var(--border)); }
.nav-inner { display:flex; align-items:center; justify-content:space-between; height:64px; }
.brand { font-family:var(--font-mono); font-weight:600; font-size:.95rem; display:flex; align-items:center; gap:.55rem; }
.brand .dia { width:11px; height:11px; background:hsl(var(--cobalt)); transform:rotate(45deg); box-shadow:0 0 12px hsl(var(--cobalt)/.8); }
.nav-links { display:flex; align-items:center; gap:2px; }
.nav-links a { position:relative; font-family:var(--font-mono); font-size:.8rem; font-weight:400; color:hsl(var(--muted)); padding:.5rem .75rem; transition:color .2s; }
.nav-links a:hover { color:hsl(var(--text)); }
.nav-links a.active { color:hsl(var(--text)); }
.nav-links a.active::before { content:""; position:absolute; left:.75rem; bottom:.2rem; width:6px; height:6px; background:hsl(var(--cobalt)); }
.nav-right { display:flex; align-items:center; gap:.5rem; }
.icon-btn { width:36px; height:36px; border-radius:var(--radius); border:1px solid hsl(var(--border-2)); background:transparent;
  display:grid; place-items:center; cursor:pointer; color:hsl(var(--text)); transition:transform .2s, border-color .2s, color .2s; }
.icon-btn:hover { transform:translateY(-2px); border-color:hsl(var(--cobalt)); color:hsl(var(--cobalt)); }
.hamburger { display:none; }
.mobile-menu { display:none; }
#scrollbar { position:fixed; top:0; left:0; height:2px; width:0; z-index:110; background:hsl(var(--cobalt)); box-shadow:0 0 10px hsl(var(--cobalt)); }

/* ============ REVEAL ============ */
.reveal { opacity:0; transform:translateY(30px); transition:opacity .8s var(--ease), transform .8s var(--ease); }
.reveal.in { opacity:1; transform:none; }
[data-stagger] > * { opacity:0; transform:translateY(24px); transition:opacity .7s var(--ease), transform .7s var(--ease); }
[data-stagger].in > * { opacity:1; transform:none; }

/* ============ PAGE ============ */
main { padding-top:64px; }
.page { animation:fadePage .45s var(--ease); }
@keyframes fadePage { from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }
section { padding:92px 0; }
.section-head { max-width:640px; margin-bottom:44px; }
.section-head h2 { font-size:clamp(1.7rem,4vw,2.5rem); margin:.7rem 0 .7rem; }
.section-head p { color:hsl(var(--muted)); font-size:1.02rem; }

/* ============ HERO ============ */
.hero { position:relative; min-height:calc(100vh - 64px); display:flex; align-items:center; overflow:hidden; padding:56px 0; }
.hero-grid-bg { position:absolute; inset:0; z-index:0; opacity:.5;
  background-image:linear-gradient(hsl(var(--grid-line)/.055) 1px, transparent 1px), linear-gradient(90deg, hsl(var(--grid-line)/.055) 1px, transparent 1px);
  background-size:46px 46px; mask-image:radial-gradient(90% 80% at 30% 30%, #000, transparent 88%); }
.hero-glow { position:absolute; z-index:0; width:640px; height:640px; border-radius:50%; top:-160px; right:-120px;
  background:radial-gradient(circle, hsl(var(--cobalt)/.18), transparent 62%); filter:blur(20px); }
.hero .wrap { position:relative; z-index:2; }
.hero-layout { display:grid; grid-template-columns:1.12fr .88fr; gap:54px; align-items:center; }
.term-status { display:inline-flex; align-items:center; gap:.5rem; font-family:var(--font-mono); font-size:.72rem; color:hsl(var(--muted));
  border:1px solid hsl(var(--border-2)); padding:.35rem .7rem; border-radius:999px; margin-bottom:24px; }
.term-status .live { width:7px; height:7px; border-radius:50%; background:hsl(var(--cobalt)); box-shadow:0 0 0 0 hsl(var(--cobalt)/.6); animation:pulse 2.2s infinite; }
@keyframes pulse { 0%{box-shadow:0 0 0 0 hsl(var(--cobalt)/.5);} 70%{box-shadow:0 0 0 8px hsl(var(--cobalt)/0);} 100%{box-shadow:0 0 0 0 hsl(var(--cobalt)/0);} }
.hero h1 { font-size:clamp(2.5rem,6vw,4.2rem); font-weight:600; margin-bottom:20px; }
.hero .lead { font-size:1.08rem; color:hsl(var(--muted)); max-width:540px; margin-bottom:26px; }
.hero-cta { display:flex; flex-wrap:wrap; gap:12px; }
/* terminal card on right */
.terminal { border:1px solid hsl(var(--border-2)); border-radius:10px; overflow:hidden; background:hsl(var(--surface)); box-shadow:var(--card-shadow); }
.term-bar { display:flex; align-items:center; gap:8px; padding:11px 14px; border-bottom:1px solid hsl(var(--border)); background:hsl(var(--surface-2)); }
.term-bar i { width:11px; height:11px; border-radius:50%; display:block; }
.term-bar i:nth-child(1){background:#ff5f57;} .term-bar i:nth-child(2){background:#febc2e;} .term-bar i:nth-child(3){background:#28c840;}
.term-bar .fn { margin-left:8px; font-family:var(--font-mono); font-size:.74rem; color:hsl(var(--muted)); }
.term-body { padding:20px; font-family:var(--font-mono); font-size:.84rem; line-height:1.85; min-height:230px; }
.term-body .cmd { color:hsl(var(--text)); }
.term-body .cmd .pr { color:hsl(var(--cobalt)); }
.term-body .out { color:hsl(var(--muted)); }
.term-body .out b { color:hsl(var(--text)); font-weight:500; }
.cursor-blk { display:inline-block; width:8px; height:1.05em; background:hsl(var(--cobalt)); vertical-align:-2px; animation:blink 1s step-end infinite; }
@keyframes blink { 50%{opacity:0;} }
.hero-metrics { display:flex; gap:10px; margin-top:14px; }
.hmx { flex:1; border:1px solid hsl(var(--border)); border-radius:var(--radius); padding:10px 12px; background:hsl(var(--surface)); }
.hmx b { font-family:var(--font-mono); font-size:1.05rem; color:hsl(var(--cobalt)); display:block; }
.hmx span { font-family:var(--font-mono); font-size:.66rem; color:hsl(var(--muted)); }
.portrait-wrap { position:relative; display:flex; justify-content:center; align-items:flex-end; min-height:420px; }
.portrait-wrap::before { content:""; position:absolute; inset:2% 2% -4%; z-index:0; border-radius:50% 50% 44% 44%;
  background:radial-gradient(closest-side, hsl(var(--cobalt)/.34), hsl(var(--cobalt)/.08) 55%, transparent 74%); filter:blur(26px); animation:floaty 7s ease-in-out infinite; }
.portrait-wrap::after { content:""; position:absolute; left:50%; bottom:-2%; transform:translateX(-50%); width:80%; height:16px; z-index:0;
  background:radial-gradient(closest-side, rgba(0,0,0,.55), transparent 75%); filter:blur(7px); }
html[data-theme="light"] .portrait-wrap::after { background:radial-gradient(closest-side, rgba(20,30,60,.28), transparent 75%); }
.portrait-wrap.is-placeholder::before, .portrait-wrap.is-placeholder::after { display:none; }
.portrait { position:relative; z-index:1; max-width:500px; width:100%; filter:drop-shadow(0 22px 44px rgba(0,0,0,.6)); }
.portrait-ph { position:relative; z-index:1; width:100%; max-width:420px; aspect-ratio:4/3; border:1px solid hsl(var(--border-2)); border-radius:12px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; background:hsl(var(--surface)); }
.portrait-ph .mono-mark { font-family:var(--font-display); font-weight:700; font-size:2.6rem; color:hsl(var(--cobalt)); letter-spacing:.04em; }
.portrait-ph small { font-family:var(--font-mono); font-size:.7rem; color:hsl(var(--muted)); }
@keyframes floaty { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-12px);} }

/* ============ STATS ============ */
.stats { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:hsl(var(--border)); border:1px solid hsl(var(--border)); border-radius:var(--radius); overflow:hidden; }
.stat-card { background:hsl(var(--bg)); padding:34px 28px; transition:background .3s; position:relative; }
.stat-card:hover { background:hsl(var(--surface)); }
.stat-card::after { content:""; position:absolute; left:0; top:0; width:3px; height:0; background:hsl(var(--cobalt)); transition:height .35s var(--ease); }
.stat-card:hover::after { height:100%; }
.stat-num { font-family:var(--font-mono); font-weight:600; font-size:2.7rem; line-height:1; margin-bottom:8px; }
.stat-label { color:hsl(var(--muted)); font-size:.95rem; }

/* ============ TIMELINE (commit-log style) ============ */
.timeline { position:relative; max-width:760px; margin:0 auto; padding-left:8px; }
.timeline::before { content:""; position:absolute; left:7px; top:6px; bottom:6px; width:2px; background:hsl(var(--border-2)); }
.timeline-fill { position:absolute; left:7px; top:6px; width:2px; height:0; background:hsl(var(--cobalt)); box-shadow:0 0 10px hsl(var(--cobalt)/.7); transition:height .1s linear; }
.tl-item { position:relative; padding:0 0 34px 40px; }
.tl-node { position:absolute; left:0; top:5px; width:16px; height:16px; border-radius:50%; background:hsl(var(--bg)); border:2px solid hsl(var(--border-2)); z-index:2; transition:border-color .3s, box-shadow .3s, background .3s; }
.tl-item.in .tl-node { border-color:hsl(var(--cobalt)); background:hsl(var(--cobalt)); box-shadow:0 0 0 5px hsl(var(--cobalt)/.16); }
.tl-date { font-family:var(--font-mono); font-size:.76rem; color:hsl(var(--cobalt)); margin-bottom:4px; }
.tl-role { font-family:var(--font-display); font-weight:600; margin-bottom:3px; }
.tl-desc { color:hsl(var(--muted)); font-size:.92rem; }
.tl-desc a { color:hsl(var(--text)); border-bottom:1px solid hsl(var(--cobalt)); }

/* ============ TESTIMONIALS ============ */
.tst-wrap { max-width:800px; margin:0 auto; }
.tst-card { border:1px solid hsl(var(--border)); border-left:2px solid hsl(var(--cobalt)); border-radius:var(--radius); padding:32px 34px; background:hsl(var(--surface)); min-height:200px; }
.tst-quote { font-size:clamp(1.1rem,2.2vw,1.4rem); line-height:1.55; margin-bottom:18px; }
.tst-quote::before { content:"> "; font-family:var(--font-mono); color:hsl(var(--cobalt)); }
.tst-author { font-family:var(--font-mono); color:hsl(var(--muted)); font-size:.85rem; }
.tst-author b { color:hsl(var(--cobalt)); font-weight:500; }
.tst-controls { display:flex; justify-content:center; align-items:center; gap:14px; margin-top:24px; }
.tst-dots { display:flex; gap:7px; }
.tst-dot { width:8px; height:8px; background:hsl(var(--border-2)); cursor:pointer; transition:all .3s; }
.tst-dot.active { background:hsl(var(--cobalt)); width:22px; }

/* ============ PROJECT EXPLORER ============ */
.explorer-controls { display:flex; flex-wrap:wrap; gap:12px; align-items:center; margin-bottom:20px; }
.search-box { position:relative; flex:1; min-width:230px; }
.search-box input { width:100%; padding:.75rem 1rem .75rem 2.5rem; border-radius:var(--radius); border:1px solid hsl(var(--border-2)); background:hsl(var(--surface)); color:hsl(var(--text)); font-family:var(--font-mono); font-size:.86rem; transition:border-color .2s, box-shadow .2s; }
.search-box input::placeholder { color:hsl(var(--muted)); }
.search-box input:focus { outline:none; border-color:hsl(var(--cobalt)); box-shadow:0 0 0 3px hsl(var(--cobalt)/.16); }
.search-box svg { position:absolute; left:.85rem; top:50%; transform:translateY(-50%); color:hsl(var(--muted)); }
select.sort { padding:.75rem 1rem; border-radius:var(--radius); border:1px solid hsl(var(--border-2)); background:hsl(var(--surface)); color:hsl(var(--text)); font-family:var(--font-mono); font-size:.82rem; cursor:pointer; }
.filter-row { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; align-items:center; }
.filter-label { font-family:var(--font-mono); font-size:.7rem; letter-spacing:.02em; text-transform:lowercase; color:hsl(var(--cobalt)); margin-right:4px; }
.filter-label::before { content:"// "; opacity:.6; }
.pill { font-family:var(--font-mono); font-size:.76rem; font-weight:400; padding:.42rem .8rem; border-radius:var(--radius); cursor:pointer; border:1px solid hsl(var(--border-2)); background:transparent; color:hsl(var(--muted)); transition:all .2s var(--ease); }
.pill:hover { border-color:hsl(var(--cobalt)); color:hsl(var(--text)); }
.pill.active { background:hsl(var(--cobalt)); color:#fff; border-color:hsl(var(--cobalt)); }
.result-count { font-family:var(--font-mono); color:hsl(var(--muted)); font-size:.8rem; margin-bottom:18px; }
.project-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
.pcard { background:hsl(var(--surface)); border:1px solid hsl(var(--border)); border-radius:var(--radius); padding:22px; cursor:pointer; position:relative; overflow:hidden; transition:transform .3s var(--ease), border-color .3s, box-shadow .3s; display:flex; flex-direction:column; }
.pcard:hover { transform:translateY(-6px); border-color:hsl(var(--cobalt)/.55); box-shadow:var(--card-shadow); }
.pcard::before { content:""; position:absolute; left:0; top:0; height:100%; width:2px; background:hsl(var(--cobalt)); transform:scaleY(0); transform-origin:top; transition:transform .3s var(--ease); }
.pcard:hover::before { transform:scaleY(1); }
.pcard .top { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.co { display:inline-flex; align-items:center; font-family:var(--font-mono); font-size:.68rem; font-weight:600; padding:.26rem .6rem; border-radius:4px; letter-spacing:0; }
.co-Meta { background:hsl(var(--cobalt)/.14); color:hsl(var(--cobalt)); }
.co-SalesIntel { background:hsl(0 0% 100%/.08); color:hsl(var(--text)); border:1px solid hsl(var(--border-2)); }
html[data-theme="light"] .co-SalesIntel { background:hsl(0 0% 0%/.05); }
.co-Mintigo { background:hsl(0 0% 55%/.16); color:hsl(var(--muted)); }
.pcard .idx { font-family:var(--font-mono); font-size:.7rem; color:hsl(var(--muted)); }
.pcard h3 { font-size:1.18rem; margin-bottom:6px; }
.pcard .sub { color:hsl(var(--muted)); font-size:.85rem; margin-bottom:14px; }
.pcard .metric { font-family:var(--font-mono); font-weight:500; font-size:.82rem; color:hsl(var(--cobalt)); margin-bottom:16px; display:flex; align-items:center; gap:.4rem; }
.pcard .prog { margin-top:auto; font-family:var(--font-mono); font-size:.68rem; color:hsl(var(--muted)); padding-top:14px; border-top:1px solid hsl(var(--border)); display:flex; align-items:center; gap:.4rem; }
.pcard .read { margin-top:12px; font-family:var(--font-mono); font-size:.76rem; font-weight:500; color:hsl(var(--cobalt)); display:flex; align-items:center; gap:.35rem; }
.pcard:hover .read svg { transform:translateX(4px); }
.pcard .read svg { transition:transform .25s; }
.empty { text-align:center; padding:60px 0; color:hsl(var(--muted)); font-family:var(--font-mono); font-size:.9rem; }

/* ============ PROJECT DETAIL ============ */
.detail-hero { background:hsl(var(--bg-2)); padding:60px 0 44px; border-bottom:1px solid hsl(var(--border)); position:relative; overflow:hidden; }
.detail-hero .hero-glow { top:-220px; right:-140px; }
.back-link { display:inline-flex; align-items:center; gap:.4rem; font-family:var(--font-mono); color:hsl(var(--muted)); font-size:.8rem; margin-bottom:22px; transition:color .2s, transform .2s; }
.back-link:hover { color:hsl(var(--cobalt)); transform:translateX(-3px); }
.detail-hero h1 { font-size:clamp(1.8rem,4.5vw,2.9rem); margin:8px 0 10px; position:relative; z-index:2; }
.detail-hero .sub { font-family:var(--font-mono); color:hsl(var(--muted)); font-size:.92rem; position:relative; z-index:2; }
.detail-body { display:grid; grid-template-columns:190px 1fr; gap:46px; max-width:940px; margin:0 auto; padding-top:52px; }
.detail-nav { position:sticky; top:92px; align-self:start; }
.detail-nav a { display:block; padding:.45rem .8rem; font-family:var(--font-mono); font-size:.8rem; color:hsl(var(--muted)); border-left:2px solid hsl(var(--border)); transition:all .2s; }
.detail-nav a.active, .detail-nav a:hover { color:hsl(var(--cobalt)); border-left-color:hsl(var(--cobalt)); }
.detail-section { margin-bottom:42px; }
.detail-section h2 { font-family:var(--font-mono); font-size:.78rem; letter-spacing:.02em; text-transform:lowercase; color:hsl(var(--cobalt)); margin-bottom:14px; }
.detail-section h2::before { content:"// "; opacity:.6; }
.detail-section p { margin-bottom:14px; color:hsl(var(--text)/.9); }
.detail-section ul { list-style:none; }
.detail-section li { margin-bottom:14px; padding-left:22px; position:relative; color:hsl(var(--text)/.9); }
.detail-section li::before { content:"▸"; position:absolute; left:0; top:0; color:hsl(var(--cobalt)); font-size:.8rem; }

/* ============ AI STUDIO ============ */
.agents-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:60px; }
.agent-card { background:hsl(var(--surface)); border:1px solid hsl(var(--border)); border-radius:var(--radius); padding:24px; transition:transform .3s var(--ease), border-color .3s; }
.agent-card:hover { transform:translateY(-6px); border-color:hsl(var(--cobalt)/.55); }
.agent-ico { width:42px; height:42px; border-radius:var(--radius); border:1px solid hsl(var(--border-2)); display:grid; place-items:center; color:hsl(var(--cobalt)); margin-bottom:16px; }
.agent-card h3 { font-size:1.08rem; margin-bottom:8px; }
.agent-card .glyph { font-family:var(--font-mono); color:hsl(var(--cobalt)); font-size:.72rem; margin-bottom:10px; }
.agent-card p { color:hsl(var(--muted)); font-size:.88rem; margin-bottom:16px; }
.agent-card a { font-family:var(--font-mono); font-size:.78rem; font-weight:500; color:hsl(var(--cobalt)); display:inline-flex; align-items:center; gap:.4rem; }
/* live demo */

let revealObs;
function initReveal() {
  if(revealObs) revealObs.disconnect();
  revealObs = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); revealObs.unobserve(e.target); } });
  }, { threshold:.1, rootMargin:'0px 0px -40px 0px' });
  document.querySelectorAll('.reveal, [data-stagger]').forEach(n=>revealObs.observe(n));
}
function onScroll() {
  const st=document.documentElement.scrollTop||document.body.scrollTop;
  const sh=document.documentElement.scrollHeight-document.documentElement.clientHeight;
  document.getElementById('scrollbar').style.width=(sh>0?(st/sh*100):0)+'%';
  const fill=document.getElementById('tlFill');
  if(fill){ const tl=fill.parentElement, r=tl.getBoundingClientRect(), vh=window.innerHeight;
    const prog=Math.min(1,Math.max(0,(vh*0.7 - r.top)/r.height)); fill.style.height=(prog*100)+'%'; }
  document.querySelectorAll('.tl-item').forEach(it=>{ if(it.getBoundingClientRect().top<window.innerHeight*0.78) it.classList.add('in'); });
  const dnav=document.getElementById('detailNav');
  if(dnav){ let cur=''; document.querySelectorAll('.detail-section').forEach(s=>{ if(s.getBoundingClientRect().top<160) cur=s.id.replace('detail-',''); });
    dnav.querySelectorAll('a').forEach(a=>a.classList.toggle('active', a.dataset.sec===cur)); }
}

function animateCounters() {
  const obs=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      if(!e.isIntersecting) return; const node=e.target; obs.unobserve(node);
      const target=parseFloat(node.dataset.count), pre=node.dataset.prefix||'', suf=node.dataset.suffix||'';
      const dur=1400, start=performance.now();
      const step=(t)=>{ const p=Math.min(1,(t-start)/dur); const eased=1-Math.pow(1-p,3);
        node.textContent=pre+Math.round(eased*target)+suf; if(p<1) requestAnimationFrame(step); };
      requestAnimationFrame(step);
    });
  }, {threshold:.5});
  document.querySelectorAll('[data-count]').forEach(n=>obs.observe(n));
}

  const draw=()=>{
    if(!document.body.contains(wrap)){ clearInterval(tstTimer); return; }
    wrap.innerHTML=`
      <div class="tst-card" id="tstCard">

    const card=document.getElementById('tstCard');
    if(card.animate) card.animate([{opacity:0,transform:'translateY(12px)'},{opacity:1,transform:'none'}],{duration:420,easing:'ease'});
    wrap.querySelectorAll('.tst-dot').forEach(d=>d.classList.toggle('active',+d.dataset.i===idx));
    document.getElementById('tstPrev').onclick=()=>{idx=(idx-1+TESTIMONIALS.length)%TESTIMONIALS.length;draw();reset();};

    wrap.querySelectorAll('.tst-dot').forEach(d=>d.onclick=()=>{idx=+d.dataset.i;draw();reset();});
  };
  const reset=()=>{ clearInterval(tstTimer); tstTimer=setInterval(()=>{idx=(idx+1)%TESTIMONIALS.length;draw();},6500); };

}

    if(box) box.innerHTML = prdName ? ('▸ '+esc(prdName)+' — parsed by the Information Extractor in the live workflow') : '';
  });
  document.getElementById('sampleBtn').addEventListener('click', showSample);
}
const BANNED=["seamless","seamlessly","end-to-end","groundbreaking","revolutionary","cutting-edge","game-changing","game changing","best-in-class","world-class","synergy","synergies","paradigm","unparalleled"];
function scrubBanned(text) {
  let flagged=[];
  let out=text;
  BANNED.forEach(w=>{
    const re=new RegExp('\\b'+w.replace(/[-\/\\^$*+?.()|[\]{}]/g,'\\$&')+'\\b','gi');
    if(re.test(out)){ flagged.push(w); out=out.replace(re,''); }
  });
  out=out.replace(/\s{2,}/g,' ').replace(/\s+([,.])/g,'$1');
  return {out, flagged:[...new Set(flagged.map(w=>w.toLowerCase()))]};
}
function g(id){ const n=document.getElementById(id); return n?(n.value||'').trim():''; }
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function stripDot(s){ return s.replace(/\.$/,''); }
function showSample() {
  const ex=currentExample();
  const out=document.getElementById('demoOut');
  out.innerHTML=`<div class="thinking"><i></i><i></i><i></i> <span style="margin-left:6px">assembling sample…</span></div>`;
  let full='';
  if(demoMode==='product'){
    full+=`«tagline»\n${ex.output.tagline}\n\n`;
    full+=`«positioning statement»\n${ex.output.positioning}\n\n`;
    full+=`«unique value proposition»\n`+ex.output.uvp.map((u,i)=>`  ${i+1}. ${u}`).join('\n')+`\n\n`;
  } else {
    full+=`«feature release note»\n${ex.output.note}\n\n`;
  }
  const foot=[];
  foot.push(`<b>▸ sample</b> representative output for the “${esc(ex.label)}” preset — not a live generation.`);
  if(prdName) foot.push(`<b>▸ input</b> ${esc(prdName)} would be parsed by the Information Extractor (Gemini) and given precedence over the form.`);
  foot.push(`<b>▸ governance</b> banned-words check passed — no filler (“seamless”, “end-to-end”, “groundbreaking”…) present.`);
  setTimeout(()=>typeOut(out, full, foot.join('<br>')), 620);
}
function typeOut(node, text, footerHTML) {
  node.innerHTML='<div class="typewriter"></div>';
  const tw=node.querySelector('.typewriter');
  let i=0; const cursor='<span class="cursor"></span>';
  const paint=(upto)=>{ tw.innerHTML=esc(text.slice(0,upto)).replace(/«(.+?)»/g,'<span class="sec-title">$1</span>')+cursor; };
  const tick=()=>{
    i+=Math.max(2,Math.round(Math.random()*3)+2); paint(i); node.scrollTop=node.scrollHeight;
    if(i<text.length) setTimeout(tick,9);
    else { tw.innerHTML=esc(text).replace(/«(.+?)»/g,'<span class="sec-title">$1</span>');
      if(footerHTML){ const gv=document.createElement('div'); gv.className='demo-foot'; gv.innerHTML=footerHTML; node.appendChild(gv); } }
  };
  tick();
}

/* ================= THEME / MOBILE ================= */
function initTheme() {
  const saved=(function(){try{return localStorage.getItem('aw-theme');}catch(e){return null;}})()||'dark';
  document.documentElement.setAttribute('data-theme',saved); updateThemeIcon();
  document.getElementById('themeToggle').addEventListener('click',()=>{
    const cur=document.documentElement.getAttribute('data-theme'), next=cur==='dark'?'light':'dark';
    document.documentElement.setAttribute('data-theme',next);
    try{localStorage.setItem('aw-theme',next);}catch(e){} updateThemeIcon();
  });
}
function updateThemeIcon(){ const dark=document.documentElement.getAttribute('data-theme')==='dark'; document.getElementById('themeToggle').innerHTML=dark?I.sun:I.moon; }
function initMobile(){ document.getElementById('hamburger').addEventListener('click',()=>document.getElementById('mobileMenu').classList.toggle('open')); }
function closeMobile(){ document.getElementById('mobileMenu').classList.remove('open'); }

/* ================= BOOT ================= */
document.getElementById('year').textContent=new Date().getFullYear();
buildNav(); initTheme(); initMobile();
window.addEventListener('hashchange', render);
window.addEventListener('scroll', onScroll, {passive:true});
render();
